// ── FIX: Fetch user's section access ───────────────────────────
// Explicitly gets the current session access_token and waits for
// the client to have a valid session before querying.
async function getUserAccess() {
  // Ensure we have a fresh session before querying
  const { data: { session }, error: sessionError } = await sb.auth.getSession();

  if (sessionError || !session) {
    return [];
  }

  const { data, error } = await sb
    .from('section_access')
    .select('section_id');

  if (error) {
    console.error('Error fetching section access:', error.message);
    return [];
  }

  return (data || []).map(row => row.section_id);
}

// ── Get signed URL from Edge Function ──────────────────────────
async function getSignedUrl(filePath) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) throw new Error('Session expired. Please sign in again.');

  const response = await fetch(`${SUPABASE_URL}/functions/v1/get-download-url`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ file_path: filePath })
  });

  const result = await response.json();
  if (!response.ok) throw new Error(result.error || 'Failed to get document URL');
  return result.url;
}

async function downloadFile(filePath, btn) {
  btn.classList.add('loading');
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Getting link...';

  try {
    const url = await getSignedUrl(filePath);
    window.open(url, '_blank');
    showToast('Download started!', 'success');
  } catch (err) {
    if (err.message.includes('Session expired')) { showLogin(); }
    showToast(err.message || 'Download failed. Try again.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = origHTML;
  }
}

// ── View PDF in Adobe Embed viewer ─────────────────────────────
async function viewPDF(filePath, fileName, btn) {
  btn.classList.add('loading');
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Loading...';

  try {
    const url = await getSignedUrl(filePath);

    // Update modal title
    pdfTitle.innerHTML = `<span>${fileName}</span>`;

    // Show overlay
    pdfOverlay.classList.add('active');

    // Clear previous viewer
    const viewerEl = document.getElementById('adobe-pdf-viewer');
    viewerEl.innerHTML = '';

    // Wait for Adobe SDK to be ready
    document.addEventListener('adobe_dc_view_sdk.ready', function() {
      renderAdobeViewer(url, fileName, viewerEl);
    });

    // If SDK is already ready
    if (window.AdobeDC) {
      renderAdobeViewer(url, fileName, viewerEl);
    }

  } catch (err) {
    if (err.message.includes('Session expired')) { showLogin(); }
    showToast(err.message || 'Could not load document. Try again.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = origHTML;
  }
}

function renderAdobeViewer(url, fileName, viewerEl) {
  // Ensure the element has a unique ID
  viewerEl.id = 'adobe-pdf-viewer';

  const adobeDCView = new AdobeDC.View({
    clientId: ADOBE_API_KEY,
    divId: 'adobe-pdf-viewer'
  });

  adobeDCView.previewFile(
    {
      content: { location: { url } },
      metaData: { fileName }
    },
    {
      embedMode: 'SIZED_CONTAINER',
      showDownloadPDF: true,
      showPrintPDF: true,
      showLeftHandPanel: true,
      showPageControls: true,
      dockPageControls: false
    }
  );
}

function closePDFViewer() {
  pdfOverlay.classList.remove('active');
  document.getElementById('adobe-pdf-viewer').innerHTML = '';
}

// Close viewer on overlay background click
pdfOverlay.addEventListener('click', (e) => {
  if (e.target === pdfOverlay) closePDFViewer();
});

// Close viewer on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePDFViewer();
});

// ── Render dashboard cards ──────────────────────────────────────
function renderDashboard(ownedSections) {
  dashGrid.innerHTML = '';

  SECTIONS.forEach(section => {
    const owned = ownedSections.includes(section.id);
    const card = document.createElement('div');
    card.className = `dash-card${owned ? '' : ' locked'}`;

    if (owned) {
      const pdfButtons = section.files.map(file => `
        <div class="file-row">
          <span class="file-label">${file.label}</span>
          <button class="btn-view" onclick="viewPDF('${file.path}', '${file.label} — Section ${section.num}', this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            View
          </button>
          <button class="btn-download" onclick="downloadFile('${file.path}', this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      `).join('');

      const xlsxButtons = (section.spreadsheets || []).map(file => `
        <div class="file-row">
          <span class="file-label">${file.label}</span>
          <button class="btn-download" onclick="downloadFile('${file.path}', this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="dash-card-header">
          <div>
            <div class="dash-card-section">Section ${section.num} <span class="status-badge owned">Owned</span></div>
            <div class="dash-card-title">${section.title}</div>
          </div>
          <div class="dash-card-pages">
            <div class="dash-card-pages-num">${section.pages}</div>
            <div class="dash-card-pages-label">pages</div>
          </div>
        </div>
        <div class="dash-card-body">
          <div class="dash-card-desc">${section.desc}</div>
          <div class="dash-files">
            ${pdfButtons}
            ${xlsxButtons}
          </div>
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="dash-card-header">
          <div>
            <div class="dash-card-section">Section ${section.num} <span class="status-badge locked">Not Purchased</span></div>
            <div class="dash-card-title">${section.title}</div>
          </div>
          <div class="dash-card-pages">
            <div class="dash-card-pages-num">${section.pages}</div>
            <div class="dash-card-pages-label">pages</div>
          </div>
        </div>
        <div class="dash-card-body">
          <div class="dash-card-desc">${section.desc}</div>
          <a href="${section.buyUrl}" class="btn-buy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            Purchase Section ${section.num} — ${section.price}
          </a>
        </div>
      `;
    }

    dashGrid.appendChild(card);
  });
}

// ── FIX: Init — handles ALL auth state events correctly ─────────
// SIGNED_IN      → fresh login via magic link
// INITIAL_SESSION → page refresh with existing session  ← was missing
// TOKEN_REFRESHED → token auto-renewed                  ← was missing
// SIGNED_OUT      → user signed out
async function init() {
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session && (
      event === 'SIGNED_IN' ||
      event === 'INITIAL_SESSION' ||
      event === 'TOKEN_REFRESHED'
    )) {
      showDashboard(session.user.email);
      const owned = await getUserAccess();
      renderDashboard(owned);
    } else if (event === 'SIGNED_OUT' || (event === 'INITIAL_SESSION' && !session)) {
      showLogin();
    }
  });
}

init();
