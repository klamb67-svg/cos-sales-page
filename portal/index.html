function showToast(msg, type = '') {
  toast.textContent = msg; toast.className = 'toast ' + type;
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ── getUserAccess with full debug output ─────────────────────────
async function getUserAccess(accessToken, userId) {

  try {
    const url = `${SUPABASE_URL}/rest/v1/section_access?select=section_id`;
    const response = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + accessToken,
        'Accept': 'application/json'
      }
    });

    const httpStatus = response.status;

    const text = await response.text();

    if (!response.ok) { return []; }

    let data;
    try { data = JSON.parse(text); } catch (e) { return []; }

    return Array.isArray(data) ? data.map(row => String(row.section_id).trim()) : [];

  } catch (err) {
    return [];
  }
}

async function getSignedUrl(filePath, accessToken) {
  const response = await fetch(`${SUPABASE_URL}/functions/v1/get-download-url`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken, 'apikey': SUPABASE_ANON_KEY },
    body: JSON.stringify({ file_path: filePath })
  });

  const result = await response.json();
  if (!response.ok) throw new Error((result && result.error) || 'HTTP ' + response.status);
  return result.url;
}

async function downloadFile(filePath, btn) {
  btn.classList.add('loading'); const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Getting link...';
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showLogin(); return; }
    const url = await getSignedUrl(filePath, session.access_token);
    window.open(url, '_blank'); showToast('Download started!', 'success');
  } catch (err) { showToast(err.message || 'Download failed.', 'error'); }
  finally { btn.classList.remove('loading'); btn.innerHTML = orig; }
}

async function viewPDF(filePath, fileName, btn) {
  btn.classList.add('loading'); const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Loading...';
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showLogin(); return; }
    const url = await getSignedUrl(filePath, session.access_token);
    pdfTitle.innerHTML = '<span>' + fileName + '</span>';
    pdfOverlay.classList.add('active');
    document.getElementById('adobe-pdf-viewer').innerHTML = '';
    const launch = () => {
      new AdobeDC.View({ clientId: ADOBE_API_KEY, divId: 'adobe-pdf-viewer' })
        .previewFile({ content: { location: { url } }, metaData: { fileName } }, { embedMode: 'SIZED_CONTAINER', showDownloadPDF: true, showPrintPDF: true, showLeftHandPanel: true });
    };
    if (window.AdobeDC) launch();
    else document.addEventListener('adobe_dc_view_sdk.ready', launch, { once: true });
  } catch (err) { showToast(err.message || 'Could not load document.', 'error'); }
  finally { btn.classList.remove('loading'); btn.innerHTML = orig; }
}

function closePDFViewer() {
  pdfOverlay.classList.remove('active');
  document.getElementById('adobe-pdf-viewer').innerHTML = '';
}
pdfOverlay.addEventListener('click', e => { if (e.target === pdfOverlay) closePDFViewer(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePDFViewer(); });

function renderDashboard(ownedSections) {
  dashGrid.innerHTML = '';
  SECTIONS.forEach(section => {
    const owned = ownedSections.includes(section.id);
    const card = document.createElement('div');
    card.className = 'dash-card' + (owned ? '' : ' locked');

    const header = `<div class="dash-card-header"><div><div class="dash-card-section">Section ${section.num} <span class="status-badge ${owned ? 'owned' : 'locked'}">${owned ? 'Owned' : 'Not Purchased'}</span></div><div class="dash-card-title">${section.title}</div></div><div><div class="dash-card-pages-num">${section.pages}</div><div class="dash-card-pages-label">pages</div></div></div>`;

    if (owned) {
      const pdfRows = section.files.map(f => `<div class="file-row"><span class="file-label">${f.label}</span><button class="btn-download" onclick="downloadFile('${f.path}',this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</button></div>`).join('');
      const xlsxRows = (section.spreadsheets || []).map(f => `<div class="file-row"><span class="file-label">${f.label}</span><button class="btn-download" onclick="downloadFile('${f.path}',this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</button></div>`).join('');
      card.innerHTML = header + `<div class="dash-card-body"><div class="dash-card-desc">${section.desc}</div><div class="dash-files">${pdfRows}${xlsxRows}</div></div>`;
    } else {
      card.innerHTML = header + `<div class="dash-card-body"><div class="dash-card-desc">${section.desc}</div><a href="${section.buyUrl}" class="btn-buy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Purchase Section ${section.num} — ${section.price}</a></div>`;
    }
    dashGrid.appendChild(card);
  });
}

// ── Dual-track init ──────────────────────────────────────────────
let authHandled = false;

async function handleAuthSession(session) {
  if (authHandled) return;
  authHandled = true;
  if (session) {
    showDashboard(session.user.email);
    const owned = await getUserAccess(session.access_token, session.user.id);
    renderDashboard(owned);
  } else {
    showLogin();
  }
}

async function init() {
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') { authHandled = false; showLogin(); return; }
    if (event === 'TOKEN_REFRESHED' && session) {
      const owned = await getUserAccess(session.access_token, session.user.id);
      renderDashboard(owned); return;
    }
    await handleAuthSession(session);
  });

  const { data: { session } } = await sb.auth.getSession();
  await handleAuthSession(session);
}

init();
</script>
